# Security hardening for nginx (place inside your server block)

# Block access to migrations and database dumps
location ^~ /migrations/ {
    deny all;
}

location ^~ /database/ {
    deny all;
}

# Prevent directory listing and PHP execution in uploads
location ^~ /uploads/ {
    autoindex off;
}

location ~* ^/uploads/.*\.(php|phtml|php3|php4|php5|php7|phps|phar|cgi|pl|asp|aspx|jsp|sh)$ {
    deny all;
}

# Optional: lock signatures folder explicitly
location ^~ /uploads/signatures/ {
    autoindex off;
}
